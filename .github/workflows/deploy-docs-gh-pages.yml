name: Publish master GitHub Pages

on:
  workflow_dispatch: ## Run the workflow manually
  schedule:
    - cron: '0 18 * * *' # This cron expression means "at 03:00 (midnight) JST, every day"

permissions:
  contents: write

jobs:
  publish-gh-pages:
    runs-on:
      - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v2

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.14
          opam-repositories: |
            default: https://github.com/ocaml/opam-repository.git
            rocq-released: https://rocq-prover.org/opam/released
            rocq-extra-dev: https://rocq-prover.org/opam/extra-dev

      - name: Build Mathcomp Analysis
        run: opam install -y --deps-only . --with-doc && opam exec -- make -j 4

      - name: Generate Documents
        run: opam exec -- make html

      # Publish GitHub Pages
      # Push `gh-pages` branch
      - name: Push gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./html
          destination_dir: docs/master
          # keep_files: true
          user_name: github-actions
          user_email: github-actions@github.com
